# Site settings
title: "游戏技术策划日报"
description: "每日精选游戏开发技术文章 - 聚焦技术策划、UE5/Unity、开放世界、工具链"
baseurl: "/gamedev-tech-daily"
url: "https://sionsychen.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true
    permalink: /:year/:month/:day/:title/

# Default values
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Categories
categories:
  - UE5
  - Unity
  - 技术策划
  - 开放世界
  - 工具链
  - 工业化

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
