# Site settings
title: "GameDev Tech Daily"
description: "Daily curated game development technical articles - Focus on Technical Design, UE5/Unity, Open World, Toolchains"
baseurl: "/gamedev-tech-daily"
url: "https://sionsychen.github.io"

# Default language
lang: en

# Build settings
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true

# Default values
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Categories
categories:
  - UE5
  - Unity
  - 技术策划
  - 开放世界
  - 工具链
  - 工业化

# Exclude
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
