---
layout: default
title: Search
---

<section class="search-page">
  <div class="container">
    <h2 class="page-title" data-i18n="search.title">🔍 Search</h2>
    
    <div class="search-box">
      <input type="text" id="search-input" data-i18n-placeholder="search.placeholder" placeholder="Search articles..." class="search-input" autocomplete="off">
    </div>
    
    <div id="search-results" class="search-results">
      <p class="search-hint" data-i18n="search.hint">Enter keywords to search articles...</p>
    </div>
    
    <div class="back-link-container">
      <a href="{{ '/' | relative_url }}" class="back-link" data-i18n="common.backHome">← Back to Home</a>
    </div>
  </div>
</section>

<script>
// Page-specific i18n for search page
(function() {
  const pageI18n = {
    en: {
      'search.title': '🔍 Search',
      'search.placeholder': 'Search articles...',
      'search.hint': 'Enter keywords to search articles...',
      'search.noResults': 'No matching articles found.',
      'search.found': 'Found',
      'search.results': 'results',
      'common.backHome': '← Back to Home'
    },
    zh: {
      'search.title': '🔍 搜索',
      'search.placeholder': '搜索文章...',
      'search.hint': '输入关键词搜索文章...',
      'search.noResults': '未找到匹配的文章。',
      'search.found': '找到',
      'search.results': '个结果',
      'common.backHome': '← 返回首页'
    }
  };

  // Register page-specific language handler
  window.onLanguageChange = function(lang) {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (pageI18n[lang] && pageI18n[lang][key]) {
        el.textContent = pageI18n[lang][key];
      }
    });
    document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.dataset.i18nPlaceholder;
      if (pageI18n[lang] && pageI18n[lang][key]) {
        el.placeholder = pageI18n[lang][key];
      }
    });
  };
})();

// Build search data from posts (include both EN and ZH)
const searchData = [
  {% for post in site.posts %}
  {% for article in post.articles %}
  {
    title: {{ article.title | jsonify }},
    title_zh: {{ article.title_zh | jsonify }},
    url: {{ post.url | relative_url | jsonify }},
    date: {{ post.date | jsonify }},
    category: {{ article.category | jsonify }},
    summary: {{ article.summary | jsonify }},
    summary_zh: {{ article.summary_zh | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
  {% endfor %}
];

const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

function getI18nText(key) {
  const lang = localStorage.getItem('site-language') || 'en';
  const texts = {
    en: {
      'search.hint': 'Enter keywords to search articles...',
      'search.noResults': 'No matching articles found.',
      'search.found': 'Found',
      'search.results': 'results'
    },
    zh: {
      'search.hint': '输入关键词搜索文章...',
      'search.noResults': '未找到匹配的文章。',
      'search.found': '找到',
      'search.results': '个结果'
    }
  };
  return texts[lang][key] || texts['en'][key];
}

function getDisplayTitle(item) {
  const lang = localStorage.getItem('site-language') || 'en';
  return lang === 'zh' && item.title_zh ? item.title_zh : item.title;
}

searchInput.addEventListener('input', function() {
  const query = this.value.toLowerCase().trim();
  
  if (query.length === 0) {
    searchResults.innerHTML = `<p class="search-hint">${getI18nText('search.hint')}</p>`;
    return;
  }
  
  const results = searchData.filter(item => {
    const titleMatch = item.title.toLowerCase().includes(query) || 
                      (item.title_zh && item.title_zh.toLowerCase().includes(query));
    const summaryMatch = (item.summary && item.summary.toLowerCase().includes(query)) ||
                        (item.summary_zh && item.summary_zh.toLowerCase().includes(query));
    const categoryMatch = item.category && item.category.toLowerCase().includes(query);
    return titleMatch || summaryMatch || categoryMatch;
  });
  
  if (results.length === 0) {
    searchResults.innerHTML = `<p class="search-hint">${getI18nText('search.noResults')}</p>`;
    return;
  }
  
  const foundText = getI18nText('search.found');
  const resultsText = getI18nText('search.results');
  
  let html = `<div class="results-count">${foundText} ${results.length} ${resultsText}</div>
    <div class="results-list">`;
  
  results.forEach(item => {
    html += `
      <a href="${item.url}" class="result-item">
        <span class="result-date">${item.date.substring(0, 10)}</span>
        <span class="result-title">${getDisplayTitle(item)}</span>
      </a>
    `;
  });
  
  html += '</div>';
  searchResults.innerHTML = html;
});
</script>

<style>
.search-page {
  padding: 3rem 0;
}

.page-title {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2rem;
}

.search-box {
  margin-bottom: 1.5rem;
}

.search-input {
  width: 100%;
  padding: 0.875rem 1rem;
  font-size: 1rem;
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  background: var(--bg-secondary);
  color: var(--text-primary);
}

.search-input:focus {
  outline: none;
  border-color: var(--accent);
}

.search-input::placeholder {
  color: var(--text-muted);
}

.search-hint {
  color: var(--text-muted);
  text-align: center;
  padding: 2rem 0;
}

.results-count {
  color: var(--text-muted);
  margin-bottom: 1rem;
  font-size: 0.9rem;
}

.results-list {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.result-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: all 0.2s ease;
  text-decoration: none;
}

.result-item:hover {
  background: var(--bg-tertiary);
  border-color: var(--accent);
}

.result-date {
  font-size: 0.875rem;
  color: var(--accent-light);
  font-weight: 500;
  min-width: 100px;
  flex-shrink: 0;
}

.result-title {
  flex: 1;
  color: var(--text-secondary);
  font-weight: 500;
}

.back-link-container {
  margin-top: 2rem;
}

.back-link {
  color: var(--accent-light);
  font-weight: 500;
  transition: color 0.2s;
  text-decoration: none;
}

.back-link:hover {
  color: var(--accent);
}
</style>
