<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="container">
            <div class="header-content">
                <a href="{{ '/' | relative_url }}" class="logo">
                    <span class="logo-icon">🎮</span>
                    <div class="logo-text">
                        <span class="logo-title">GameDev Tech</span>
                        <span class="logo-subtitle">Daily</span>
                    </div>
                </a>
                
                <nav class="site-nav">
                    <a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}" data-i18n="nav.home">Home</a>
                    <a href="{{ '/archive' | relative_url }}" class="nav-link {% if page.url contains 'archive' %}active{% endif %}" data-i18n="nav.archive">Archive</a>
                    <a href="{{ '/categories' | relative_url }}" class="nav-link {% if page.url contains 'categories' %}active{% endif %}" data-i18n="nav.categories">Categories</a>
                    <a href="{{ '/search' | relative_url }}" class="nav-link {% if page.url contains 'search' %}active{% endif %}" data-i18n="nav.search">Search</a>
                </nav>

                <!-- Language Switcher -->
                <div class="lang-switcher">
                    <button class="lang-btn active" data-lang="en" onclick="switchLanguage('en')">EN</button>
                    <span class="lang-divider">|</span>
                    <button class="lang-btn" data-lang="zh" onclick="switchLanguage('zh')">中</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        {{ content }}
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} | <span data-i18n="footer.curated">Curated for game developers</span></p>
        </div>
    </footer>

    <script>
    // Global language switcher for all pages
    (function() {
        const navi18n = {
            en: {
                'nav.home': 'Home',
                'nav.categories': 'Categories',
                'nav.archive': 'Archive',
                'nav.search': 'Search',
                'footer.curated': 'Curated for game developers'
            },
            zh: {
                'nav.home': '首页',
                'nav.categories': '分类',
                'nav.archive': '归档',
                'nav.search': '搜索',
                'footer.curated': '为游戏开发者精心策划'
            }
        };
        
        // Content language switcher - switches article content
        function switchContentLanguage(lang) {
            document.querySelectorAll('[data-lang-content]').forEach(el => {
                el.style.display = el.dataset.langContent === lang ? 'block' : 'none';
            });
        }
        
        window.switchLanguage = function(lang) {
            localStorage.setItem('site-language', lang);
            document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
            
            // Update nav and footer
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (navi18n[lang] && navi18n[lang][key]) {
                    el.textContent = navi18n[lang][key];
                }
            });
            
            // Update button active state
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            
            // Switch article content
            switchContentLanguage(lang);
            
            // Call page-specific handler if exists
            if (window.onLanguageChange) {
                window.onLanguageChange(lang);
            }
        };

        // Initialize on page load - wait for DOM and page-specific handlers
        const savedLang = localStorage.getItem('site-language') || 'en';
        function initLanguage() {
            // Small delay to ensure page-specific onLanguageChange is registered
            setTimeout(() => window.switchLanguage(savedLang), 0);
        }
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initLanguage);
        } else {
            initLanguage();
        }
    })();
    </script>
</body>
</html>
