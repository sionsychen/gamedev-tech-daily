---
layout: default
title: Archive
---

<section class="archive-page">
  <div class="container">
    <h2 class="page-title" data-i18n="archive.title">📚 Archive</h2>
    
    <div class="archive-list-full">
      {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
      {% for post in sorted_posts %}
        <a href="{{ post.url | relative_url }}" class="archive-item">
          <span class="archive-date">{{ post.date | date: "%b %d, %Y" }}</span>
          <span class="archive-title" data-title-en="{{ post.title }}" data-title-zh="{{ post.title_zh | default: post.title }}">{{ post.title }}</span>
          <svg class="archive-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
          </svg>
        </a>
      {% endfor %}
    </div>
    
    <div class="back-link-container">
      <a href="{{ '/' | relative_url }}" class="back-link" data-i18n="common.backHome">← Back to Home</a>
    </div>
  </div>
</section>

<script>
// Page-specific i18n for archive page
(function() {
  const pageI18n = {
    en: {
      'archive.title': '📚 Archive',
      'common.backHome': '← Back to Home'
    },
    zh: {
      'archive.title': '📚 文章归档',
      'common.backHome': '← 返回首页'
    }
  };

  // Register page-specific language handler
  window.onLanguageChange = function(lang) {
    // Update static i18n elements
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (pageI18n[lang] && pageI18n[lang][key]) {
        el.textContent = pageI18n[lang][key];
      }
    });
    
    // Update article titles
    document.querySelectorAll('[data-title-en][data-title-zh]').forEach(el => {
      if (lang === 'zh' && el.dataset.titleZh) {
        el.textContent = el.dataset.titleZh;
      } else {
        el.textContent = el.dataset.titleEn;
      }
    });
  };
})();
</script>

<style>
.archive-page {
  padding: 3rem 0;
}

.page-title {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 2rem;
}

.archive-list-full {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.archive-item {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1rem 1.25rem;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  transition: all 0.2s ease;
  text-decoration: none;
}

.archive-item:hover {
  background: var(--bg-tertiary);
  border-color: var(--accent);
}

.archive-date {
  font-size: 0.875rem;
  color: var(--accent-light);
  font-weight: 500;
  min-width: 100px;
  flex-shrink: 0;
}

.archive-title {
  flex: 1;
  color: var(--text-secondary);
  font-weight: 500;
}

.archive-arrow {
  width: 1rem;
  height: 1rem;
  color: var(--text-muted);
}

.back-link-container {
  margin-top: 2rem;
}

.back-link {
  color: var(--accent-light);
  font-weight: 500;
  transition: color 0.2s;
  text-decoration: none;
}

.back-link:hover {
  color: var(--accent);
}
</style>
